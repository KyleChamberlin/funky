---
name: Security

"on":
  push:
    branches: [main]
    paths:
      - ".github/workflows/security.yml"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
      - "**/*.rs"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
      - "**/*.rs"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      # v6
      - uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # v2
      - uses: >-
          EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb
        with:
          command: check
          arguments: --all-features
          command-arguments: >-
            advisories licenses bans sources
      - uses: >-
          taiki-e/install-action@85b24a67ef0c632dfefad70b9d5ce8fddb040754
        if: always()
        with:
          tool: cargo-deny
      - name: Generate SARIF
        if: always()
        run: >-
          cargo deny --all-features --format sarif
          check advisories licenses bans sources
          > deny-results.sarif || true
      - name: Upload SARIF
        # v4
        uses: >-
          github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        if: always()
        with:
          sarif_file: deny-results.sarif
          category: cargo-deny

  trivy:
    name: Trivy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      # v6
      - uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Run Trivy filesystem scan
        # v0.35.0
        uses: >-
          aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
      - name: Upload SARIF
        # v4
        uses: >-
          github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep
    steps:
      # v6
      - uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Run Semgrep
        run: >-
          semgrep scan
          --config p/rust
          --config p/security-audit
          --config p/secrets
          --sarif
          --output semgrep-results.sarif
        env:
          SEMGREP_RULES: >-
            p/rust p/security-audit p/secrets
      - name: Upload SARIF
        # v4
        uses: >-
          github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  cargo-machete:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    steps:
      # v6
      - uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # v0.9.1
      - uses: >-
          bnjbvr/cargo-machete@7959c845782fed02ee69303126d4a12d64f1db18
