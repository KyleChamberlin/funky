---
name: CI

"on":
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      # v6
      - uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      # v2
      - uses: >-
          Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      # v4
      - uses: >-
          jdx/mise-action@1648a7812b9aeae629881980618f079932869151
      - name: Run linters
        run: hk check

  clippy-sarif:
    name: Clippy SARIF
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      # v6
      - uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # stable
      - uses: >-
          dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          components: clippy
      # v2
      - uses: >-
          Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      # v2
      - uses: >-
          taiki-e/install-action@85b24a67ef0c632dfefad70b9d5ce8fddb040754
        with:
          tool: clippy-sarif,sarif-fmt
      - name: Clippy
        run: >
          cargo clippy
          --all-features
          --all-targets
          --message-format=json
          | clippy-sarif
          | tee clippy-results.sarif
          | sarif-fmt
        continue-on-error: true
      - name: Ensure valid SARIF
        if: always()
        run: |
          if [ ! -s clippy-results.sarif ] \
            || ! python3 -c \
            "import json,sys; json.load(open(sys.argv[1]))" \
            clippy-results.sarif 2>/dev/null; then
            cat <<'SARIF' > clippy-results.sarif
          {"version":"2.1.0","$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json","runs":[{"tool":{"driver":{"name":"clippy","informationUri":"https://rust-lang.github.io/rust-clippy/"}},"results":[]}]}
          SARIF
          fi
      - name: Upload SARIF
        # v4
        uses: >-
          github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        if: always()
        with:
          sarif_file: clippy-results.sarif
          category: clippy
          wait-for-processing: true

  test:
    name: Test (${{ matrix.build }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - build: stable-linux
            os: ubuntu-latest
            rust: stable
            required: true
          - build: stable-macos
            os: macos-latest
            rust: stable
            required: true
          - build: stable-windows
            os: windows-latest
            rust: stable
            required: true
          - build: beta
            os: ubuntu-latest
            rust: beta
            required: false
          - build: nightly
            os: ubuntu-latest
            rust: nightly
            required: false
    continue-on-error: ${{ !matrix.required }}
    steps:
      # v6
      - uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: >-
          dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ matrix.rust }}
      # v2
      - uses: >-
          Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          shared-key: ${{ matrix.build }}
          save-if: >-
            ${{ github.ref == 'refs/heads/main' }}
      - run: cargo test --workspace --no-fail-fast

  gate:
    name: Gate
    if: always()
    needs: [lint, clippy-sarif, test]
    runs-on: ubuntu-latest
    steps:
      # v1.2.2
      - uses: >-
          re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe
        with:
          jobs: ${{ toJSON(needs) }}
